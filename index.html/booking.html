<section class="intro">

<h2>نموذج حجز إقامة الكلب</h2>

<p>
يمكنك من خلال هذا النموذج حجز غرفة لكلبك في فندق Loving Homes بسهولة.
يرجى تعبئة المعلومات التالية وسنقوم بالتواصل معك لتأكيد الحجز.
</p>

</section>

<section class="booking-section">

<form class="booking-form">

<div class="form-group">
<label>اسم صاحب الكلب</label>
<input type="text" placeholder="اكتب اسمك">
</div>

<div class="form-group">
<label>رقم الهاتف</label>
<input type="tel" placeholder="07xxxxxxxx">
</div>

<div class="form-group">
<label>اسم الكلب</label>
<input type="text" placeholder="اسم الكلب">
</div>

<div class="form-group">
<label>نوع الكلب</label>
<input type="text" placeholder="مثال: جيرمن شيبرد">
</div>

<div class="form-group">
<label>تاريخ الوصول</label>
<input type="date">
</div>

<div class="form-group">
<label>تاريخ المغادرة</label>
<input type="date">
</div>

<div class="form-group">
<label>نوع الغرفة</label>
<select>
<option>غرفة عادية</option>
<option>غرفة فاخرة</option>
<option>جناح VIP</option>
<option>غرفة تدريب وإقامة</option>
</select>
</div>

<div class="form-group full">
<label>ملاحظات إضافية</label>
<textarea placeholder="اكتب أي ملاحظات إضافية"></textarea>
</div>

<button class="book-btn">إرسال طلب الحجز</button>

</form>

</section>

<footer>
<p>© 2026 Loving Homes</p>
</footer>

<script>

/* الوضع الليلي */

document.getElementById("toggle-mode").onclick=function(){
document.body.classList.toggle("dark-mode");
};

/* تكبير الخط */

let fontSize=18;

document.getElementById("increase-font").onclick=function(){
fontSize+=2;
document.body.style.fontSize=fontSize+"px";
};

/* تصغير الخط */

document.getElementById("decrease-font").onclick=function(){
fontSize-=2;
document.body.style.fontSize=fontSize+"px";
};

/* قراءة النص */

document.getElementById("read-text").onclick=function(){

let text=document.querySelector(".intro").innerText;

let speech=new SpeechSynthesisUtterance(text);

speech.lang="ar";

speechSynthesis.speak(speech);

};

</script>
